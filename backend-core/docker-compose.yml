services:
  kajian-core-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=kajian
      - POSTGRES_PASSWORD=kajian
      - POSTGRES_DB=kajian
    volumes:
      - core-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kajian"]
      interval: 10s
      timeout: 5s
      retries: 5

  kajian-core-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - core-minio:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  kajian-core-api:
    build: .
    ports:
      - "8090:8080"
    env_file:
      - .env
    environment:
      # Container-network hostnames, distinct from whatever .env sets for
      # local/non-compose runs.
      - DATABASE_URL=postgresql+asyncpg://kajian:kajian@kajian-core-db:5432/kajian
      - S3_ENDPOINT_URL=http://kajian-core-minio:9000
    depends_on:
      kajian-core-db:
        condition: service_healthy
      kajian-core-minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  core-db:
  core-minio:
