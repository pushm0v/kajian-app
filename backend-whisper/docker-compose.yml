services:
  kajian-whisper:
    build: .
    ports:
      # Different port than ../backend/'s 8080/8081, so both can run on
      # the same host at once if desired.
      - "8082:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - whisper-cache:/srv/.cache/whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s # first boot downloads model weights (~3-6GB)

volumes:
  whisper-cache:
