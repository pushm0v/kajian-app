name: kajian_app
description: "Kajian Notes — record kajian audio, transcribe it (live + cloud), and generate AI notes automatically."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Audio recording
  record: ^5.1.2

  # On-device / native speech-to-text (live transcription)
  speech_to_text: ^6.6.2

  # Runtime permissions (microphone)
  permission_handler: ^11.3.1

  # Networking (cloud transcription + AI notes backend)
  http: ^1.2.2

  # Local persistence
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
