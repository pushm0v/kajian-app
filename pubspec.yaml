name: kajian_app
description: "Kajian Notes — record kajian audio, transcribe it (live + cloud), and generate AI notes automatically."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Audio recording
  record: ^6.2.1

  # On-device / native speech-to-text (live transcription)
  speech_to_text: ^6.6.2

  # Runtime permissions (microphone)
  permission_handler: ^11.3.1

  # Networking (cloud transcription + AI notes backend)
  http: ^1.2.2

  # On-device / offline high-accuracy transcription (whisper.cpp)
  whisper_ggml: ^2.4.0

  # Authentication
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.5

  # Local persistence
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App icon generation. Regenerate the source PNGs with
#   python3 tools/generate_icon.py
# then apply them to the native projects with
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23
  adaptive_icon_background: "assets/icon/app_icon_background.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/app_icon_monochrome.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0C8074"
    theme_color: "#0C8074"
