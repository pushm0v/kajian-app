name: kajian_app
description: "Kajian Notes — record kajian audio, transcribe it (live + cloud), and generate AI notes automatically."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Audio recording
  record: ^6.2.1

  # On-device / native speech-to-text (live transcription)
  speech_to_text: ^7.0.0

  # Runtime permissions (microphone)
  permission_handler: ^11.3.1

  # Networking (cloud transcription + AI notes backend)
  http: ^1.2.2

  # On-device / offline high-accuracy transcription (whisper.cpp)
  whisper_ggml: ^2.4.0

  # Authentication
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.5

  # Local persistence
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  # whisper_ggml pins ^2.1.0, whose vendored FFmpeg .frameworks predate
  # arm64-simulator support (Xcode 26 / Apple Silicon simulators fail to
  # link: "Failed to find matching arch for input file"). 3.4.2 rebuilds
  # them as proper arm64-simulator + arm64-device xcframeworks.
  ffmpeg_kit_flutter_new_min: ^3.4.2

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-ExtraBold.ttf
          weight: 800

# App icon generation. Apply to the native projects with
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0C8074"
    theme_color: "#0C8074"
